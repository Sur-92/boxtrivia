name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'games/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck-and-build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Skip install scripts: better-sqlite3's native build only matters
      # for `npm run dev` / packaging. CI here only compiles TS and bundles.
      - name: Install (no native build)
        run: npm install --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Test (authoring guardrails)
        run: npm test

      - name: Validate bundled game boards
        run: npm run validate:games

      - name: Build (electron-vite bundles)
        run: npm run build

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: out-${{ github.sha }}
          path: out/
          retention-days: 7
